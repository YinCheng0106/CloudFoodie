{% extends 'base.html' %}
{% block title %}刪除美食 - 雲端美食{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="form-wrap text-center">
    <i class="bi bi-exclamation-triangle warn-icon"></i>
    <h1 class="form-title">確認刪除</h1>
    <p class="muted">確定要刪除「<strong style="color:var(--text)">{{ food.title }}</strong>」嗎?<br>此動作無法復原。</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-4">
      {% csrf_token %}
      <button type="submit" class="btn-danger"><i class="bi bi-trash"></i> 確認刪除</button>
      <a href="{% url 'foods:detail' food.pk %}" class="btn-ghost">取消</a>
    </form>
  </div>
</div>
{% endblock %}
